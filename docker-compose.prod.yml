services:
  web:
    build: .
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/db.sqlite3
      MEDIA_ROOT: /app/media
    volumes:
      # Данные на диске сервера (не внутри Docker volume) — переживают rebuild и смену имени проекта
      - ./data:/app/data
      - ./persistent/media:/app/media
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "python -c \"import socket; socket.create_connection(('127.0.0.1', 8000), 5).close()\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
